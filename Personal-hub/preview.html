<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Hub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; display: flex; height: 100vh; overflow: hidden; }

  .sidebar { width: 260px; background: #1e293b; color: white; padding: 24px 0; flex-shrink: 0; display: flex; flex-direction: column; }
  .sidebar h1 { font-size: 20px; font-weight: 700; padding: 0 24px; margin-bottom: 32px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; font-size: 14px; cursor: pointer; transition: background 0.15s; border: none; background: none; color: white; width: 100%; text-align: left; }
  .nav-item:hover { background: rgba(59,130,246,0.15); }
  .nav-item.active { background: rgba(59,130,246,0.2); border-right: 3px solid #3b82f6; }
  .nav-item span.icon { font-size: 18px; width: 24px; text-align: center; }
  .sidebar-footer { margin-top: auto; padding: 16px 24px; font-size: 11px; color: rgba(255,255,255,0.4); }

  .main { flex: 1; overflow-y: auto; padding: 32px 40px; }
  .main h2 { font-size: 24px; font-weight: 700; margin-bottom: 24px; }

  /* Fund cards */
  .kpi-row { display: flex; gap: 20px; margin-bottom: 32px; }
  .fund-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; flex: 1; min-width: 0; }
  .fund-card .fund-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .fund-card .fund-name { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #1e293b; }
  .fund-card .fund-remaining { font-size: 36px; font-weight: 800; margin-bottom: 4px; }
  .fund-card .fund-remaining.healthy { color: #16a34a; }
  .fund-card .fund-remaining.warning { color: #eab308; }
  .fund-card .fund-remaining.danger { color: #ef4444; }
  .fund-card .fund-detail { font-size: 12px; color: #94a3b8; margin-bottom: 2px; }
  .fund-card .fund-detail span { color: #1e293b; font-weight: 600; }
  .progress-bar { height: 8px; background: #f1f5f9; border-radius: 99px; margin-top: 16px; overflow: hidden; }
  .progress-bar .fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
  .progress-bar .fill.healthy { background: #22c55e; }
  .progress-bar .fill.warning { background: #eab308; }
  .progress-bar .fill.danger { background: #ef4444; }
  .progress-pct { font-size: 11px; color: #94a3b8; margin-top: 6px; text-align: right; }

  /* Premiums card */
  .prem-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; min-width: 260px; max-width: 300px; }
  .prem-card .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .premium-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
  .premium-item:last-child { border-bottom: none; }
  .premium-item .p-name { font-weight: 600; }
  .premium-item .p-due { font-size: 11px; color: #a16207; background: #fef9c3; padding: 2px 8px; border-radius: 6px; }
  .prem-total { margin-top: 12px; padding-top: 10px; border-top: 1px solid #e2e8f0; font-size: 13px; display: flex; justify-content: space-between; }
  .prem-total .t-label { color: #64748b; }
  .prem-total .t-value { font-weight: 700; color: #eab308; }
  .prem-none { font-size: 13px; color: #94a3b8; padding: 12px 0; }

  /* Content grid */
  .content-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; }

  /* Panels */
  .panel { background: white; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
  .panel-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; font-weight: 600; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
  .panel-header .badge { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 600; }
  .panel-header .badge.red { background: #fef2f2; color: #ef4444; }
  .panel-header .badge.amber { background: #fefce8; color: #ca8a04; }

  .list-item { padding: 14px 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; transition: background 0.1s; }
  .list-item:last-child { border-bottom: none; }
  .list-item:hover { background: #f8fafc; }
  .list-item .left { flex: 1; min-width: 0; }
  .list-item .title { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
  .list-item .meta { font-size: 12px; color: #94a3b8; }
  .list-item .right { text-align: right; flex-shrink: 0; margin-left: 16px; }
  .list-item .amount { font-weight: 700; font-size: 16px; }
  .list-item .amount.red { color: #ef4444; }
  .list-item .overdue { font-size: 11px; color: #ef4444; margin-top: 2px; }
  .fund-tag { font-size: 10px; padding: 2px 8px; border-radius: 6px; display: inline-block; margin-top: 2px; }
  .fund-tag.idl { background: #eff6ff; color: #2563eb; }
  .fund-tag.isc { background: #f0fdf4; color: #16a34a; }
  .due-tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; display: inline-block; }
  .due-tag.soon { background: #fef9c3; color: #a16207; }
  .due-tag.ok { background: #f0fdf4; color: #16a34a; }
  .empty-msg { padding: 24px; text-align: center; color: #94a3b8; font-size: 14px; }

  /* Status badges */
  .status { font-size: 11px; padding: 2px 10px; border-radius: 99px; font-weight: 600; display: inline-block; }
  .status.Paid { background: #f0fdf4; color: #16a34a; }
  .status.Pending { background: #fefce8; color: #ca8a04; }
  .status.Overdue { background: #fef2f2; color: #ef4444; }

  /* Screens */
  .screen { display: none; }
  .screen.active { display: block; }

  /* Data table */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th { text-align: left; padding: 12px 16px; font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #e2e8f0; background: #fafbfc; }
  .data-table td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
  .data-table tr:hover td { background: #f8fafc; }
  .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
  .filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; background: white; }
  .filter-bar input { flex: 1; max-width: 300px; }

  /* Fund summary bar */
  .fund-summary-bar { display: flex; gap: 16px; margin-bottom: 20px; }
  .fund-summary-item { flex: 1; border-radius: 8px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
  .fund-summary-item.idl { background: #eff6ff; }
  .fund-summary-item.isc { background: #f0fdf4; }
  .fund-summary-item .fs-label { font-size: 13px; font-weight: 600; }
  .fund-summary-item.idl .fs-label { color: #2563eb; }
  .fund-summary-item.isc .fs-label { color: #16a34a; }
  .fund-summary-item .fs-value { font-size: 15px; font-weight: 700; }
</style>
</head>
<body>

<div class="sidebar">
  <h1>Personal Hub</h1>
  <button class="nav-item active" onclick="showScreen('home', this)">
    <span class="icon">🏠</span> Dashboard
  </button>
  <button class="nav-item" onclick="showScreen('ndis', this)">
    <span class="icon">💰</span> NDIS Transactions
  </button>
  <button class="nav-item" onclick="showScreen('insurance', this)">
    <span class="icon">🛡️</span> Insurance & Super
  </button>
  <div class="sidebar-footer">Personal Hub v1.0</div>
</div>

<div class="main">
  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <h2>Dashboard</h2>
    <div class="kpi-row" id="dashboard-kpis"></div>
    <div class="content-grid">
      <div class="panel">
        <div class="panel-header">Overdue NDIS Payments <span class="badge red" id="overdue-badge"></span></div>
        <div id="overdue-list"></div>
      </div>
      <div class="panel">
        <div class="panel-header">Upcoming Premiums <span class="badge amber">Next 7 days</span></div>
        <div id="premiums-list"></div>
      </div>
    </div>
  </div>

  <!-- NDIS -->
  <div class="screen" id="screen-ndis">
    <h2>NDIS Transactions 2026</h2>
    <div class="fund-summary-bar" id="ndis-fund-bar"></div>
    <div class="filter-bar">
      <select id="ndis-status-filter" onchange="renderNDIS()">
        <option value="">All Statuses</option>
        <option>Paid</option>
        <option>Pending</option>
        <option>Overdue</option>
      </select>
      <select id="ndis-fund-filter" onchange="renderNDIS()">
        <option value="">All Funded Supports</option>
        <option>Improved Daily Living</option>
        <option>Increased Social and Community</option>
      </select>
      <input type="text" id="ndis-search" placeholder="Search provider or invoice..." oninput="renderNDIS()">
    </div>
    <div class="panel">
      <table class="data-table">
        <thead>
          <tr>
            <th>Provider</th>
            <th>Invoice</th>
            <th>Date</th>
            <th>Funded Support</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="ndis-table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- INSURANCE -->
  <div class="screen" id="screen-insurance">
    <h2>Personal Insurances & Superannuation</h2>
    <div class="filter-bar">
      <select id="ins-type-filter" onchange="renderInsurance()">
        <option value="">All Cover Types</option>
      </select>
      <input type="text" id="ins-search" placeholder="Search policy or insurer..." oninput="renderInsurance()">
    </div>
    <div class="panel">
      <table class="data-table">
        <thead>
          <tr>
            <th>Policy</th>
            <th>Insurer</th>
            <th>Policy No</th>
            <th>Cover Type</th>
            <th>Premium</th>
            <th>Frequency</th>
            <th>Payment</th>
            <th>Next Due</th>
            <th>Paid To</th>
          </tr>
        </thead>
        <tbody id="ins-table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let ndisData = { funds: {}, transactions: [] };
let insData = { policies: [] };

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const money = n => '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
const fmtDate = d => { const dt = new Date(d + 'T00:00:00'); return dt.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }); };
const shortDate = d => { const dt = new Date(d + 'T00:00:00'); return dt.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }); };
const daysDiff = d => Math.floor((new Date() - new Date(d + 'T00:00:00')) / 86400000);
const daysUntil = d => Math.floor((new Date(d + 'T00:00:00') - new Date()) / 86400000);

function fundTagClass(fund) {
  return fund.includes('Daily Living') ? 'idl' : 'isc';
}
function fundShortName(fund) {
  return fund.includes('Daily Living') ? 'Improved Daily Living' : 'Social & Community';
}
function statusColor(remaining, budget) {
  const pct = ((budget - remaining) / budget) * 100;
  if (pct >= 80) return 'danger';
  if (pct >= 50) return 'warning';
  return 'healthy';
}

function renderDashboard() {
  // Calculate spend per fund
  const spent = {};
  for (const fund in ndisData.funds) spent[fund] = 0;
  ndisData.transactions.forEach(t => {
    if (spent[t.fundedSupport] !== undefined) spent[t.fundedSupport] += t.amount;
  });

  // Fund cards + premiums card
  let kpiHtml = '';
  for (const fund in ndisData.funds) {
    const budget = ndisData.funds[fund];
    const s = spent[fund] || 0;
    const remaining = budget - s;
    const pct = Math.round((s / budget) * 100);
    const color = statusColor(remaining, budget);
    kpiHtml += `
      <div class="fund-card">
        <div class="fund-label">NDIS Funding</div>
        <div class="fund-name">${fund}</div>
        <div class="fund-remaining ${color}">${money(remaining)}</div>
        <div class="fund-detail">Budget: <span>${money(budget)}</span></div>
        <div class="fund-detail">Spent: <span>${money(s)}</span></div>
        <div class="progress-bar"><div class="fill ${color}" style="width: ${pct}%"></div></div>
        <div class="progress-pct">${pct}% used</div>
      </div>`;
  }

  // Premiums due in next 7 days
  const now = new Date();
  const in7 = insData.policies.filter(p => {
    const d = daysUntil(p.dueDate);
    return d >= 0 && d <= 7;
  });
  let premHtml = '<div class="prem-card"><div class="label">Premiums Due — Next 7 Days</div>';
  if (in7.length === 0) {
    premHtml += '<div class="prem-none">No premiums due this week</div>';
  } else {
    in7.forEach(p => {
      premHtml += `<div class="premium-item"><span class="p-name">${p.title}</span><span class="p-due">${shortDate(p.dueDate)}</span></div>`;
    });
    const total = in7.reduce((s, p) => s + p.premium, 0);
    premHtml += `<div class="prem-total"><span class="t-label">Total due</span><span class="t-value">${money(total)}</span></div>`;
  }
  premHtml += '</div>';
  kpiHtml += premHtml;
  $('#dashboard-kpis').innerHTML = kpiHtml;

  // Overdue NDIS payments (>7 days, not Paid)
  const overdue = ndisData.transactions.filter(t => t.status !== 'Paid' && daysDiff(t.date) > 7);
  $('#overdue-badge').textContent = overdue.length + ' overdue';
  if (overdue.length === 0) {
    $('#overdue-list').innerHTML = '<div class="empty-msg">No overdue payments</div>';
  } else {
    $('#overdue-list').innerHTML = overdue.sort((a, b) => new Date(a.date) - new Date(b.date)).map(t => `
      <div class="list-item">
        <div class="left">
          <div class="title">${t.title}</div>
          <div class="meta">Inv: ${t.invoiceNo} &nbsp;|&nbsp; ${fmtDate(t.date)}</div>
          <span class="fund-tag ${fundTagClass(t.fundedSupport)}">${fundShortName(t.fundedSupport)}</span>
        </div>
        <div class="right">
          <div class="amount red">${money(t.amount)}</div>
          <div class="overdue">${daysDiff(t.date)} days overdue</div>
        </div>
      </div>`).join('');
  }

  // Upcoming premiums panel (7 days)
  if (in7.length === 0) {
    $('#premiums-list').innerHTML = '<div class="empty-msg">No premiums due in the next 7 days</div>';
  } else {
    $('#premiums-list').innerHTML = in7.map(p => `
      <div class="list-item">
        <div class="left">
          <div class="title">${p.title}</div>
          <div class="meta">${p.insurer} &nbsp;|&nbsp; ${money(p.premium)}/${p.premiumFrequency.toLowerCase()}</div>
        </div>
        <div class="right"><span class="due-tag soon">Due ${shortDate(p.dueDate)}</span></div>
      </div>`).join('');
  }
}

function renderNDIS() {
  const statusF = $('#ndis-status-filter').value;
  const fundF = $('#ndis-fund-filter').value;
  const search = $('#ndis-search').value.toLowerCase();

  // Fund summary bar
  const spent = {};
  for (const fund in ndisData.funds) spent[fund] = 0;
  ndisData.transactions.forEach(t => {
    if (spent[t.fundedSupport] !== undefined) spent[t.fundedSupport] += t.amount;
  });
  let barHtml = '';
  for (const fund in ndisData.funds) {
    const remaining = ndisData.funds[fund] - (spent[fund] || 0);
    const cls = fund.includes('Daily Living') ? 'idl' : 'isc';
    const color = statusColor(remaining, ndisData.funds[fund]);
    barHtml += `<div class="fund-summary-item ${cls}">
      <span class="fs-label">${fund}</span>
      <span class="fs-value" style="color: ${color === 'healthy' ? '#16a34a' : color === 'warning' ? '#eab308' : '#ef4444'}">${money(remaining)} remaining</span>
    </div>`;
  }
  $('#ndis-fund-bar').innerHTML = barHtml;

  // Filter transactions
  let filtered = ndisData.transactions;
  if (statusF) filtered = filtered.filter(t => t.status === statusF);
  if (fundF) filtered = filtered.filter(t => t.fundedSupport === fundF);
  if (search) filtered = filtered.filter(t => t.title.toLowerCase().includes(search) || t.invoiceNo.toLowerCase().includes(search));

  filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

  $('#ndis-table-body').innerHTML = filtered.map(t => `
    <tr>
      <td><strong>${t.title}</strong></td>
      <td>${t.invoiceNo}</td>
      <td>${fmtDate(t.date)}</td>
      <td><span class="fund-tag ${fundTagClass(t.fundedSupport)}">${fundShortName(t.fundedSupport)}</span></td>
      <td><strong>${money(t.amount)}</strong></td>
      <td><span class="status ${t.status}">${t.status}</span></td>
    </tr>`).join('');
}

function renderInsurance() {
  const typeF = $('#ins-type-filter').value;
  const search = $('#ins-search').value.toLowerCase();

  let filtered = insData.policies;
  if (typeF) filtered = filtered.filter(p => p.coverType === typeF);
  if (search) filtered = filtered.filter(p => p.title.toLowerCase().includes(search) || p.insurer.toLowerCase().includes(search));

  filtered.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

  $('#ins-table-body').innerHTML = filtered.map(p => {
    const d = daysUntil(p.dueDate);
    const dueClass = d <= 7 ? 'soon' : 'ok';
    return `<tr>
      <td><strong>${p.title}</strong></td>
      <td>${p.insurer}</td>
      <td>${p.policyNo}</td>
      <td>${p.coverType}</td>
      <td><strong>${money(p.premium)}</strong></td>
      <td>${p.premiumFrequency}</td>
      <td>${p.paymentMethod}</td>
      <td><span class="due-tag ${dueClass}">${shortDate(p.dueDate)}</span></td>
      <td>${p.paidToDate ? fmtDate(p.paidToDate) : '—'}</td>
    </tr>`;
  }).join('');
}

// Populate cover type filter
function populateFilters() {
  const types = [...new Set(insData.policies.map(p => p.coverType))].sort();
  const sel = $('#ins-type-filter');
  sel.innerHTML = '<option value="">All Cover Types</option>' + types.map(t => `<option>${t}</option>`).join('');
}

async function loadData() {
  try {
    const [ndisRes, insRes] = await Promise.all([
      fetch('data/ndis-transactions.json'),
      fetch('data/insurance.json')
    ]);
    ndisData = await ndisRes.json();
    insData = await insRes.json();
  } catch (e) {
    console.log('Using sample data — JSON files not loaded:', e.message);
    // Sample data for preview
    ndisData = {
      funds: { "Improved Daily Living": 22308.85, "Increased Social and Community": 7164.48 },
      transactions: [
        { id:1, title:"Therapy Solutions Pty Ltd", invoiceNo:"INV-2026-041", date:"2026-03-12", amount:1250, status:"Overdue", ndisNo:"", fundedSupport:"Improved Daily Living" },
        { id:2, title:"Allied Health Group", invoiceNo:"INV-2026-038", date:"2026-03-15", amount:890, status:"Overdue", ndisNo:"", fundedSupport:"Increased Social and Community" },
        { id:3, title:"Support Workers Inc", invoiceNo:"INV-2026-035", date:"2026-03-18", amount:730, status:"Overdue", ndisNo:"", fundedSupport:"Improved Daily Living" },
        { id:4, title:"Mobility Assist Co", invoiceNo:"INV-2026-033", date:"2026-03-22", amount:2100, status:"Pending", ndisNo:"", fundedSupport:"Increased Social and Community" },
        { id:5, title:"Community Access Ltd", invoiceNo:"INV-2026-030", date:"2026-03-05", amount:560, status:"Paid", ndisNo:"", fundedSupport:"Improved Daily Living" },
        { id:6, title:"OT Services Australia", invoiceNo:"INV-2026-028", date:"2026-02-28", amount:420, status:"Paid", ndisNo:"", fundedSupport:"Increased Social and Community" },
        { id:7, title:"Plan Management Co", invoiceNo:"INV-2026-025", date:"2026-02-20", amount:1800, status:"Paid", ndisNo:"", fundedSupport:"Improved Daily Living" }
      ]
    };
    insData = {
      policies: [
        { id:1, title:"Home & Contents", insurer:"AAMI", policyNo:"HOM-88421", premium:285, premiumFrequency:"Monthly", paymentMethod:"Direct Debit", coverType:"Home & Contents", dueDate:"2026-03-29", paidToDate:"2026-02-28" },
        { id:2, title:"Car Insurance", insurer:"NRMA", policyNo:"MOT-55192", premium:200, premiumFrequency:"Monthly", paymentMethod:"Credit Card", coverType:"Motor Vehicle", dueDate:"2026-04-01", paidToDate:"2026-03-01" },
        { id:3, title:"Life Insurance", insurer:"AIA", policyNo:"LIF-77301", premium:120, premiumFrequency:"Monthly", paymentMethod:"Direct Debit", coverType:"Life", dueDate:"2026-04-15", paidToDate:"2026-03-15" },
        { id:4, title:"Income Protection", insurer:"TAL", policyNo:"INC-44208", premium:95, premiumFrequency:"Monthly", paymentMethod:"Direct Debit", coverType:"Income Protection", dueDate:"2026-04-20", paidToDate:"2026-03-20" },
        { id:5, title:"Super — Growth Fund", insurer:"AustralianSuper", policyNo:"SUP-99102", premium:500, premiumFrequency:"Monthly", paymentMethod:"Employer", coverType:"Superannuation", dueDate:"2026-04-30", paidToDate:"2026-02-28" }
      ]
    };
  }
  populateFilters();
  renderDashboard();
  renderNDIS();
  renderInsurance();
}

function showScreen(name, btn) {
  $$('.screen').forEach(s => s.classList.remove('active'));
  $$('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  btn.classList.add('active');
}

loadData();
</script>
</body>
</html>
