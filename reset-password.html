<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Baker Hub</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  p { font-size: 14px; color: #64748b; margin-bottom: 24px; }
  .fields { display: flex; flex-direction: column; gap: 12px; }
  .fields input { padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; font-family: inherit; color: #1e293b; outline: none; transition: border-color 0.15s; }
  .fields input:focus { border-color: #0d9488; }
  .submit-btn { padding: 14px; background: #0d9488; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; width: 100%; margin-top: 8px; }
  .submit-btn:hover { background: #0f766e; }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg { display: none; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
  .msg.visible { display: block; }
  .msg.error { background: #fef2f2; color: #ef4444; }
  .msg.success { background: #f0fdf4; color: #0d9488; border: 1px solid #bbf7d0; }
  .back-link { display: block; text-align: center; margin-top: 16px; color: #0d9488; font-size: 13px; font-weight: 600; text-decoration: none; padding: 8px; }
  .back-link:hover { text-decoration: underline; }
  .hint { font-size: 12px; color: #94a3b8; margin-top: 4px; }
</style>
</head>
<body>

<div class="card">
  <h1>Reset Password</h1>
  <p id="subtitle">Enter your new password below.</p>
  <div id="msg" class="msg"></div>
  <div class="fields" id="form-fields">
    <input type="password" id="new-password" placeholder="New password (min 6 chars)" autocomplete="new-password">
    <input type="password" id="confirm-password" placeholder="Confirm new password" autocomplete="new-password">
    <button class="submit-btn" id="submit-btn" onclick="resetPassword()">Update Password</button>
    <div class="hint" id="hint">Use at least 6 characters.</div>
  </div>
  <a href="index.html" class="back-link">Back to Sign In</a>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(async function(){
  const sb = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
  const msgEl = document.getElementById('msg');
  const fieldsEl = document.getElementById('form-fields');
  const subtitleEl = document.getElementById('subtitle');

  function showMsg(text, type){
    msgEl.textContent = text;
    msgEl.className = 'msg visible ' + (type || 'error');
  }

  // Wait briefly for Supabase to parse the recovery token from the URL hash
  await new Promise(r => setTimeout(r, 300));

  // Verify we have a recovery session
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    fieldsEl.style.display = 'none';
    subtitleEl.textContent = 'This reset link is invalid or has expired.';
    showMsg('Please request a new password reset email from the sign-in page.', 'error');
    return;
  }

  window.resetPassword = async function(){
    const newPass = document.getElementById('new-password').value;
    const confirmPass = document.getElementById('confirm-password').value;
    const btn = document.getElementById('submit-btn');

    if (!newPass || newPass.length < 6) {
      showMsg('Password must be at least 6 characters.', 'error');
      return;
    }
    if (newPass !== confirmPass) {
      showMsg('Passwords do not match.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating...';

    const { error } = await sb.auth.updateUser({ password: newPass });

    if (error) {
      showMsg(error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Update Password';
      return;
    }

    showMsg('Password updated! Redirecting to sign in...', 'success');
    fieldsEl.style.display = 'none';
    await sb.auth.signOut();
    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
  };

  // Allow Enter key to submit
  document.getElementById('confirm-password').addEventListener('keydown', function(e){
    if (e.key === 'Enter') window.resetPassword();
  });
  document.getElementById('new-password').addEventListener('keydown', function(e){
    if (e.key === 'Enter') document.getElementById('confirm-password').focus();
  });
})();
</script>
</body>
</html>
